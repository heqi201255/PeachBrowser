<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PeachBrowser Player</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/player.css">
</head>
<body>
  <div class="player-page">
    <div class="player-header">
      <button class="back-btn" id="backBtn">← <span data-i18n="confirm.previous">返回</span></button>
      <div class="player-header-title" id="playerTitle">Loading...</div>
    </div>
    
    <div class="player-content">
      <div class="player-sidebar" id="playlistSidebar">
        <div class="player-sidebar-header">
          <h3 data-i18n="media.playlist">播放列表</h3>
          <button class="sidebar-toggle" id="togglePlaylist">◀</button>
        </div>
        <div class="playlist" id="playlist"></div>
      </div>
      
      <div class="player-main">
        <div class="player-video-container" id="videoContainer"></div>
      </div>
      
      <div class="player-details collapsed" id="detailsSidebar">
        <div class="player-details-header">
          <h3 data-i18n="media.details">详情</h3>
          <button class="sidebar-toggle" id="toggleDetails">▶</button>
        </div>
        <div class="player-details-content" id="detailsContent"></div>
      </div>
    </div>
  </div>
  
  <div class="keyboard-shortcuts" id="shortcuts"></div>
  
  <script src="js/i18n/zh-CN.js"></script>
  <script src="js/i18n/en-US.js"></script>
  <script src="js/i18n/ja-JP.js"></script>
  <script src="js/i18n/index.js"></script>
  <script src="js/core/api.js"></script>
  <script src="js/utils/format.js"></script>
  <script src="js/desktop-player.js"></script>
  <script src="js/mobile-player.js"></script>
  <script>
    // Initialize language
    const currentLang = i18n.getCurrentLanguage();
    document.documentElement.lang = currentLang;
    
    // Translate static elements
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      el.textContent = t(key);
    });
    
    // Update keyboard shortcuts
    document.getElementById('shortcuts').textContent = 
      `↑ ${t('pagination.previous')} | ↓ ${t('pagination.next')} | ← -5s | → +5s | Space ${t('media.play') || 'Play/Pause'} | ESC ${t('confirm.close')}`;
    
    const urlParams = new URLSearchParams(window.location.search);
    const mediaId = parseInt(urlParams.get('mediaId'));
    const libraryId = parseInt(urlParams.get('libraryId'));
    const token = urlParams.get('token');
    const returnUrl = urlParams.get('returnUrl');
    const recursive = urlParams.get('recursive') === 'true';
    const currentPath = urlParams.get('path') || '';
    
    if (token) {
      api.setToken(token);
    }
    
    const isMobile = () => window.matchMedia('(max-width: 768px)').matches || 
                            'ontouchstart' in window || 
                            navigator.maxTouchPoints > 0;
    
    async function init() {
      try {
        const currentMedia = await api.getMediaDetail(mediaId);
        
        const params = { 
          pageSize: 1000,
          recursive: recursive ? 'true' : 'false'
        };
        
        if (currentPath) {
          params.path = currentPath;
        }
        
        const mediaList = await api.getMedia(libraryId, params);
        
        const playlist = mediaList.media.filter(m => m.file_type === 'video' || m.file_type === 'image');
        const currentIndex = playlist.findIndex(m => m.id === mediaId);
        
        if (currentMedia && !currentMedia.thumbnailUrl && currentMedia.has_thumbnail) {
          currentMedia.thumbnailUrl = `/api/libraries/${libraryId}/thumbnails/${encodeURIComponent(currentMedia.relative_path.replace(/\.[^.]+$/, '.jpg'))}?token=${token || api.getToken()}`;
        }
        
        playlist.forEach(item => {
          if (!item.thumbnailUrl && item.has_thumbnail) {
            item.thumbnailUrl = `/api/libraries/${item.library_id}/thumbnails/${encodeURIComponent(item.relative_path.replace(/\.[^.]+$/, '.jpg'))}?token=${token || api.getToken()}`;
          }
        });
        
        if (isMobile()) {
          MobilePlayer.init(currentMedia, playlist, currentIndex);
        } else {
          DesktopPlayer.init(currentMedia, playlist, currentIndex);
        }
      } catch (err) {
        console.error('Failed to load player:', err);
        document.getElementById('videoContainer').innerHTML = '<div style="color:white;padding:40px;">加载失败: ' + err.message + '</div>';
      }
    }
    
    document.getElementById('backBtn').addEventListener('click', () => {
      const baseUrl = window.location.origin + '/index.html';
      if (returnUrl) {
        try {
          const decodedUrl = decodeURIComponent(returnUrl);
          const url = new URL(decodedUrl, window.location.origin);
          window.location.href = url.href;
        } catch (e) {
          window.location.href = baseUrl;
        }
      } else {
        window.location.href = baseUrl;
      }
    });

    document.getElementById('togglePlaylist').addEventListener('click', () => {
      const sidebar = document.getElementById('playlistSidebar');
      const toggle = document.getElementById('togglePlaylist');
      sidebar.classList.toggle('collapsed');
      toggle.textContent = sidebar.classList.contains('collapsed') ? '▶' : '◀';
    });
    
    document.getElementById('toggleDetails').addEventListener('click', () => {
      const sidebar = document.getElementById('detailsSidebar');
      const toggle = document.getElementById('toggleDetails');
      sidebar.classList.toggle('collapsed');
      toggle.textContent = sidebar.classList.contains('collapsed') ? '◀' : '▶';
    });
    
    window.addEventListener('beforeunload', () => {
      if (isMobile()) {
        MobilePlayer.cleanup();
      } else {
        DesktopPlayer.cleanup();
      }
    });
    
    document.addEventListener('visibilitychange', () => {
      const videoEl = isMobile() ? MobilePlayer.videoElement : DesktopPlayer.videoElement;
      if (document.hidden && videoEl && !videoEl.paused) {
        videoEl.pause();
      }
    });
    
    init();
  </script>
</body>
</html>
